* { box-sizing: border-box; margin: 0; padding: 0; }
.wrap { padding: 1rem 0; }
.tab-row { display: flex; gap: 6px; margin-bottom: 1.25rem; flex-wrap: wrap; }
.tab { padding: 5px 14px; border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-secondary); font-size: 12px; cursor: pointer; background: var(--color-background-primary); color: var(--color-text-secondary); }
.tab.active { background: #1F3864; color: #fff; border-color: #1F3864; }
.sort-row { display: flex; gap: 6px; margin-bottom: 1rem; align-items: center; flex-wrap: wrap; }
.sort-label { font-size: 11px; color: var(--color-text-tertiary); }
.sort-btn { padding: 3px 10px; border-radius: 10px; border: 0.5px solid var(--color-border-secondary); font-size: 11px; cursor: pointer; background: var(--color-background-primary); color: var(--color-text-secondary); }
.sort-btn.active { background: #2E75B6; color: #fff; border-color: #2E75B6; }
.summary-grid { display: grid; grid-template-columns: repeat(4, minmax(0,1fr)); gap: 8px; margin-bottom: 1.25rem; }
.summary-card { background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 10px 12px; }
.summary-label { font-size: 11px; color: var(--color-text-secondary); margin-bottom: 3px; }
.summary-value { font-size: 18px; font-weight: 500; color: var(--color-text-primary); }
.summary-sub { font-size: 10px; color: var(--color-text-tertiary); margin-top: 2px; }
table { width: 100%; border-collapse: collapse; font-size: 12px; }
th { background: #1F3864; color: #fff; padding: 8px 10px; text-align: center; font-weight: 500; white-space: nowrap; border: 0.5px solid #2E4E7E; }
th.left { text-align: left; }
td { padding: 7px 10px; border: 0.5px solid var(--color-border-tertiary); vertical-align: middle; color: var(--color-text-primary); }
tr:nth-child(even) td { background: var(--color-background-secondary); }
tr:hover td { background: var(--color-background-info); }
.type-badge { display: inline-block; font-size: 10px; padding: 2px 6px; border-radius: 8px; white-space: nowrap; }
.reel { background: #FAEEDA; color: #633806; }
.slide { background: #D6E4F7; color: #1F3864; }
.img { background: #E2EFDA; color: #375623; }
.eng-bar { display: flex; align-items: center; gap: 6px; }
.bar-bg { flex: 1; height: 6px; border-radius: 3px; background: var(--color-border-tertiary); overflow: hidden; }
.bar-fill { height: 100%; border-radius: 3px; background: #1D9E75; }
.bar-fill.high { background: #1D9E75; }
.bar-fill.mid { background: #BA7517; }
.bar-fill.low { background: #E24B4A; }
.eng-val { font-size: 11px; font-weight: 500; min-width: 42px; text-align: right; }
.title-cell { max-width: 220px; }
.title-main { font-size: 12px; color: var(--color-text-primary); line-height: 1.4; }
.title-link { font-size: 10px; color: var(--color-text-info); text-decoration: none; }
.title-link:hover { text-decoration: underline; }
.num { text-align: right; white-space: nowrap; }
.rank-badge { display: inline-flex; align-items: center; justify-content: center; width: 20px; height: 20px; border-radius: 50%; font-size: 10px; font-weight: 500; }
.rank-1 { background: #EF9F27; color: #fff; }
.rank-2 { background: #B4B2A9; color: #fff; }
.rank-3 { background: #97C459; color: #fff; }
.rank-n { background: var(--color-background-secondary); color: var(--color-text-tertiary); }
</style>

function fmt(n){ if(n>=1000) return (Math.round(n/100)/10)+'K'; return String(Math.round(n)); }
function typeClass(t){ if(t.includes('릴스')) return 'reel'; if(t.includes('슬라이드')) return 'slide'; return 'img'; }
function typeLabel(t){ if(t.includes('릴스')) return '릴스'; if(t.includes('슬라이드')) return '슬라이드'; return '이미지'; }
function monthLabel(m){ return m.slice(2)+'월'; }

let curMonth = 'all', curSort = 'engagement';

function getFiltered(){
  return POSTS.filter(p => curMonth === 'all' || p.month === curMonth);
}

function getSorted(posts){
  return [...posts].sort((a,b) => b[curSort] - a[curSort]);
}

function renderSummary(posts){
  const totalViews = posts.reduce((s,p)=>s+p.views,0);
  const totalReach = posts.reduce((s,p)=>s+p.reach,0);
  const totalLikes = posts.reduce((s,p)=>s+p.likes,0);
  const totalShare = posts.reduce((s,p)=>s+p.share,0);
  const totalSave  = posts.reduce((s,p)=>s+p.save,0);
  const totalComment = posts.reduce((s,p)=>s+p.comment,0);
  const totalFollow = posts.reduce((s,p)=>s+p.follow,0);
  const engRate = totalReach > 0 ? ((totalLikes+totalShare+totalSave+totalComment)/totalReach*100).toFixed(2) : '-';
  const reelCount = posts.filter(p=>p.type.includes('릴스')).length;
  const slideCount = posts.filter(p=>p.type.includes('슬라이드')).length;

  document.getElementById('summary-area').innerHTML = `
    <div class="summary-grid">
      <div class="summary-card">
        <div class="summary-label">게시물 수</div>
        <div class="summary-value">${posts.length}개</div>
        <div class="summary-sub">슬라이드 ${slideCount} · 릴스 ${reelCount}</div>
      </div>
      <div class="summary-card">
        <div class="summary-label">총 조회수</div>
        <div class="summary-value">${fmt(totalViews)}</div>
        <div class="summary-sub">도달 ${fmt(totalReach)}</div>
      </div>
      <div class="summary-card">
        <div class="summary-label">인게이지먼트율</div>
        <div class="summary-value">${engRate}%</div>
        <div class="summary-sub">좋아요+공유+저장+댓글 기준</div>
      </div>
      <div class="summary-card">
        <div class="summary-label">팔로우 증가</div>
        <div class="summary-value">${fmt(totalFollow)}</div>
        <div class="summary-sub">공유 ${fmt(totalShare)} · 저장 ${fmt(totalSave)}</div>
      </div>
    </div>`;
}

function renderTable(posts){
  const maxEng = Math.max(...posts.map(p=>p.engagement), 1);
  const sorted = getSorted(posts);
  const tbody = document.getElementById('post-tbody');
  tbody.innerHTML = sorted.map((p,i) => {
    const eng = p.engagement;
    const barClass = eng >= 10 ? 'high' : eng >= 5 ? 'mid' : 'low';
    const barWidth = Math.round(eng/maxEng*100);
    const rankClass = i===0?'rank-1':i===1?'rank-2':i===2?'rank-3':'rank-n';
    return `<tr>
      <td style="text-align:center"><span class="rank-badge ${rankClass}">${i+1}</span></td>
      <td class="title-cell">
        <div class="title-main">${p.title}</div>
        <a class="title-link" href="${p.link}" target="_blank">게시물 보기 →</a>
      </td>
      <td style="text-align:center"><span class="type-badge ${typeClass(p.type)}">${typeLabel(p.type)}</span></td>
      <td style="text-align:center">${monthLabel(p.month)}</td>
      <td class="num">${fmt(p.views)}</td>
      <td class="num">${fmt(p.reach)}</td>
      <td>
        <div class="eng-bar">
          <div class="bar-bg"><div class="bar-fill ${barClass}" style="width:${barWidth}%"></div></div>
          <span class="eng-val">${eng.toFixed(1)}%</span>
        </div>
      </td>
      <td class="num">${p.likes}</td>
      <td class="num">${p.share}</td>
      <td class="num">${p.save}</td>
      <td class="num">${p.comment}</td>
      <td class="num">${p.follow}</td>
    </tr>`;
  }).join('');
}

function render(){
  const filtered = getFiltered();
  renderSummary(filtered);
  renderTable(filtered);
}

document.querySelectorAll('#tab-bar .tab').forEach(b=>{
  b.addEventListener('click', ()=>{
    curMonth = b.dataset.month;
    document.querySelectorAll('#tab-bar .tab').forEach(x=>x.classList.toggle('active', x===b));
    render();
  });
});

document.querySelectorAll('.sort-btn').forEach(b=>{
  b.addEventListener('click', ()=>{
    curSort = b.dataset.sort;
    document.querySelectorAll('.sort-btn').forEach(x=>x.classList.toggle('active', x===b));
    renderTable(getFiltered());
  });
});

render();
</script>
